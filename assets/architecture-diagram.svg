<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#fafafa"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Harbor Registry — Request Flow</text>

  <!-- Client -->
  <rect x="40" y="80" width="160" height="70" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Client</text>
  <text x="120" y="128" text-anchor="middle" font-size="11" fill="#444">docker push/pull</text>
  <text x="120" y="142" text-anchor="middle" font-size="11" fill="#444">worker / workstation</text>

  <!-- DNS/hosts note -->
  <rect x="240" y="80" width="150" height="70" rx="8" fill="#fff3e0" stroke="#f9a825" stroke-width="2"/>
  <text x="315" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">/etc/hosts</text>
  <text x="315" y="123" text-anchor="middle" font-size="10" fill="#444">resolves hostname</text>
  <text x="315" y="137" text-anchor="middle" font-size="10" fill="#444">to server LAN IP</text>

  <line x1="200" y1="115" x2="240" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="115" x2="440" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="105" text-anchor="middle" font-size="10" fill="#666">HTTPS :443</text>

  <!-- nginx proxy -->
  <rect x="440" y="80" width="180" height="70" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="530" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">nginx</text>
  <text x="530" y="122" text-anchor="middle" font-size="11" fill="#444">TLS termination</text>
  <text x="530" y="136" text-anchor="middle" font-size="11" fill="#444">reverse proxy</text>

  <!-- TLS trust note -->
  <rect x="660" y="80" width="200" height="70" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="760" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a1a">Client TLS trust needed:</text>
  <text x="760" y="118" text-anchor="middle" font-size="10" fill="#444">1. Docker registry trust store</text>
  <text x="760" y="132" text-anchor="middle" font-size="10" fill="#444">2. OS-wide CA store (OAuth token)</text>

  <line x1="620" y1="115" x2="655" y2="115" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Down arrow to core -->
  <line x1="530" y1="150" x2="530" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- harbor-core -->
  <rect x="380" y="210" width="300" height="80" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="530" y="238" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">harbor-core</text>
  <text x="530" y="256" text-anchor="middle" font-size="11" fill="#444">authentication · projects · REST API</text>
  <text x="530" y="272" text-anchor="middle" font-size="11" fill="#444">webhook &amp; RBAC logic</text>

  <!-- Down arrows to registry, jobservice -->
  <line x1="460" y1="290" x2="300" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="290" x2="720" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="290" x2="530" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- registry -->
  <rect x="140" y="340" width="200" height="70" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="240" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">registry</text>
  <text x="240" y="385" text-anchor="middle" font-size="11" fill="#444">image layer / blob storage</text>

  <!-- postgresql -->
  <rect x="430" y="340" width="200" height="70" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="530" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">postgresql</text>
  <text x="530" y="382" text-anchor="middle" font-size="10" fill="#444">service: postgresql</text>
  <text x="530" y="396" text-anchor="middle" font-size="10" fill="#444">container: harbor-db</text>

  <!-- jobservice -->
  <rect x="660" y="340" width="200" height="70" rx="8" fill="#f3e8fd" stroke="#a142f4" stroke-width="2"/>
  <text x="760" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">harbor-jobservice</text>
  <text x="760" y="385" text-anchor="middle" font-size="11" fill="#444">scanning · garbage collection</text>

  <!-- redis, below postgresql -->
  <line x1="530" y1="410" x2="530" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="430" y="450" width="200" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="530" y="475" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">redis</text>
  <text x="530" y="492" text-anchor="middle" font-size="11" fill="#444">cache / job queue</text>

  <!-- data volume note -->
  <rect x="140" y="450" width="200" height="60" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">data_volume</text>
  <text x="240" y="492" text-anchor="middle" font-size="10" fill="#555">persistent host disk</text>
  <line x1="240" y1="410" x2="240" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- footer note -->
  <rect x="40" y="540" width="820" height="55" rx="6" fill="#fff3e0" stroke="#f9a825" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-size="11" fill="#5f4b00">If the stack silently drops containers (e.g. only harbor-log remains),</text>
  <text x="450" y="578" text-anchor="middle" font-size="11" fill="#5f4b00">a full "docker-compose down" then "up -d" reliably restores it — see docs/postmortem-stack-down.md</text>
</svg>
